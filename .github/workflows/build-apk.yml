name: Build Allrounder99 APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip app source
        run: |
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip -q "$ZIP_FILE"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project files
        working-directory: allrounder99_flutter_app
        run: flutter create --platforms=android --org com.allrounder99 .

      - name: Get packages
        working-directory: allrounder99_flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: allrounder99_flutter_app
        run: flutter build apk --release --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Allrounder99-APK
          path: allrounder99_flutter_app/build/app/outputs/flutter-apk/app-release.apk
